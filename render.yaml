services:
  - type: web
    name: airbnb-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: airbnb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: airbnb-db
    plan: free
